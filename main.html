<html>

<head>
    <meta charset="utf-8" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <!-- Variant 1: Minimalist Centered Layout -->
    <section class="relative py-24 md:py-32 bg-[#0047FF] overflow-hidden">
        <div class="absolute inset-0 opacity-10 pointer-events-none">
            <div
                class="absolute top-0 left-0 w-64 h-64 bg-white rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2">
            </div>
            <div
                class="absolute bottom-0 right-0 w-96 h-96 bg-white rounded-full blur-3xl translate-x-1/3 translate-y-1/3">
            </div>
        </div>
        <div class="container mx-auto px-6 relative z-10 text-center">
            <h2 class="text-4xl md:text-6xl font-extrabold text-white mb-6">Biz bilan bog'lanish</h2>
            <p class="text-lg md:text-xl text-white/80 max-w-2xl mx-auto mb-10">
                Loyihangizni yangi bosqichga olib chiqishga tayyormisiz? Biz bilan hoziroq bog'laning va bepul
                konsultatsiyaga ega bo'ling.
            </p>
            <button
                class="inline-flex items-center px-10 py-5 bg-white text-[#0047FF] font-bold text-xl rounded-xl hover:bg-slate-50 transition-colors shadow-xl">
                Biz bilan bog'lanish
                <span class="material-icons ml-2">arrow_forward</span>
            </button>
        </div>
    </section>
</body>

</html>
